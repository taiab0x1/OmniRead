services:
  postgres:
    image: postgres:16
    container_name: omniread_postgres
    environment:
      POSTGRES_USER: omniread
      POSTGRES_PASSWORD: omniread
      POSTGRES_DB: omniread
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: ["5434:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniread"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: omniread_redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports: ["6381:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports: ["8000:8000"]
    volumes:
      - ./:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  celery_worker:
    build: .
    env_file: .env
    depends_on:
      redis:    { condition: service_healthy }
      postgres: { condition: service_healthy }
    command: ["celery", "-A", "app.celery_app.celery", "worker", "--loglevel=INFO", "-Q", "high,default,low"]
    volumes:
      - ./:/app

  celery_beat:
    build: .
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }
    command: ["celery", "-A", "app.celery_app.celery", "beat", "--loglevel=INFO"]
    volumes:
      - ./:/app

volumes:
  postgres_data:
  redis_data:
